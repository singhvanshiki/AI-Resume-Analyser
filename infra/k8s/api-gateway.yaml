apiVersion: v1
kind: Service
metadata:
  name: api-gateway
spec:
  selector:
    app: api-gateway
  ports:
    - port: 8000
      targetPort: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: ai-resume-analyzer/api-gateway:latest
          env:
            - name: DATABASE_URL
              value: postgresql+asyncpg://resume:resume_pass@postgres:5432/resume_ai
            - name: REDIS_URL
              value: redis://redis:6379/0
            - name: JWT_SECRET
              value: local-dev-secret
            - name: JWT_ALGORITHM
              value: HS256
            - name: CORS_ORIGINS
              value: http://localhost:8080
          ports:
            - containerPort: 8000
