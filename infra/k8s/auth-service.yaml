apiVersion: v1
kind: Service
metadata:
  name: auth-service
spec:
  selector:
    app: auth-service
  ports:
    - port: 8000
      targetPort: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: ai-resume-analyzer/auth-service:latest
          env:
            - name: DATABASE_URL
              value: postgresql+asyncpg://resume:resume_pass@postgres:5432/resume_ai
            - name: JWT_SECRET
              value: local-dev-secret
            - name: JWT_ALGORITHM
              value: HS256
          ports:
            - containerPort: 8000
