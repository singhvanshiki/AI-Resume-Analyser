apiVersion: v1
kind: Service
metadata:
  name: analysis-service
spec:
  selector:
    app: analysis-service
  ports:
    - port: 8000
      targetPort: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: analysis-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: analysis-service
  template:
    metadata:
      labels:
        app: analysis-service
    spec:
      containers:
        - name: analysis-service
          image: ai-resume-analyzer/analysis-service:latest
          env:
            - name: DATABASE_URL
              value: postgresql+asyncpg://resume:resume_pass@postgres:5432/resume_ai
            - name: REDIS_URL
              value: redis://redis:6379/0
            - name: OPENROUTER_API_KEY
              value: local-dev-key
          ports:
            - containerPort: 8000
