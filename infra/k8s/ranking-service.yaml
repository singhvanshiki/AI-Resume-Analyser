apiVersion: v1
kind: Service
metadata:
  name: ranking-service
spec:
  selector:
    app: ranking-service
  ports:
    - port: 8000
      targetPort: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ranking-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ranking-service
  template:
    metadata:
      labels:
        app: ranking-service
    spec:
      containers:
        - name: ranking-service
          image: ai-resume-analyzer/ranking-service:latest
          env:
            - name: DATABASE_URL
              value: postgresql+asyncpg://resume:resume_pass@postgres:5432/resume_ai
          ports:
            - containerPort: 8000
